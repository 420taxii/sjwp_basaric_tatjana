<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Layout</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #ddd;
}

.container {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
}

/* BOJE */
.orange { background: orange; height: 50px; }
.yellow { background: #d4ff00; height: 120px; }
.blue { background: #4f83c2; height: 70px; }
.gray { background: #ccc; height: 60px; }

.box {
  width: 100%;
}

/* GRUPE - MOBILE (320px) */
.orange-group,
.blue-group,
.gray-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* TABLET (>=768px) */
@media (min-width: 768px) {

  .blue-group {
    flex-direction: column;
  }

  .gray-group {
    flex-direction: row;
    flex-wrap: wrap;
  }

  .gray-group .box {
    width: calc(50% - 5px);
  }
}

/* DESKTOP (>=1024px) */
@media (min-width: 1024px) {

  .orange-group {
    flex-direction: row;
  }

  .orange-group .box {
    width: calc(50% - 5px);
  }

  .blue-group {
    flex-direction: row;
  }

  .blue-group .box {
    width: calc(33.33% - 7px);
  }

  .gray-group .box {
    width: calc(25% - 8px);
  }
}
</style>

</head>
<body>

<div class="container">

  <div class="orange-group">
    <div class="box orange"></div>
    <div class="box orange"></div>
  </div>

  <div class="box yellow"></div>

  <div class="blue-group">
    <div class="box blue"></div>
    <div class="box blue"></div>
    <div class="box blue"></div>
  </div>

  <div class="gray-group">
    <div class="box gray"></div>
    <div class="box gray"></div>
    <div class="box gray"></div>
    <div class="box gray"></div>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zadatak 2</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #ddd;
  height: 100vh;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* BOJE */
.a { background: orangered; }
.b { background: orange; }
.c { background: gold; }
.d { background: yellowgreen; }

.container > div {
  width: 100%;
  height: 25%; /* 4 reda na mobitelu */
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

/* TABLET (2x2) */
@media (min-width: 768px) {
  .container {
    flex-direction: row;
    flex-wrap: wrap;
  }

  .container > div {
    width: 50%;
    height: 50%;
  }
}

/* DESKTOP (4 u redu) */
@media (min-width: 1024px) {
  .container {
    flex-wrap: nowrap;
  }

  .container > div {
    width: 25%;
    height: 100%;
  }
}
</style>

</head>
<body>

<div class="container">
  <div class="a">1</div>
  <div class="b">2</div>
  <div class="c">3</div>
  <div class="d">4</div>
</div>

</body>
</html>
