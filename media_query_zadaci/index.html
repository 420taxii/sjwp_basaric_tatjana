<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .container{
            display: grid;
            
            grid-template-columns: repeat(2,1fr);
            grid-template-rows:repeat(10,1fr);
            gap: 10px;
            padding:20px;
            color:white;
            font-weight:bold;
 }
        
        .header{

        background-color: black;
        grid-column:1;
        grid-row:span 2;
        
        }
        .menu{
            background-color: red;
            grid-column:1;
           
        }
        .hero{
            background-color: rgb(75, 92, 165);
            grid-column:1;
           
        }
        .main{
            background-color: rgb(71, 71, 71);
            grid-column:1;
            
        }
        .banner{
            background-color: rgb(252, 252, 136);
            grid-column:1;
          
        }
        .extra{
            background-color: rgb(96, 167, 96);
            grid-column:1;
            
        }
        .image{
            background-color: rgb(117, 152, 199);
            grid-column:span 1;
           
       
        }


        @media (min-width: 768px) {
  .layout {
    grid-template-columns: 200px 1fr;
    grid-template-rows: auto auto 1fr auto auto;
  }

  .header { grid-column: 1 / 3; grid-row: 1; }
  .hero   { grid-column: 1 / 3; grid-row: 2; }

  .menu   { grid-column: 1; grid-row: 3 / 5; }

  .main   { grid-column: 2; grid-row: 3; }
  .banner { grid-column: 2; grid-row: 4; }

  .extra  { grid-column: 1; grid-row: 5; }
  .image  { grid-column: 2; grid-row: 5; }
}
    </style>
</head>
<body>

<div class="container">
<header class="header">Header</header>
<nav class="menu">Menu</nav>
<section class="hero">Hero</section>
<main class="main">Main</main>
<section class="banner">Banner</section>
<aside class="extra">Extra</aside>
<section class="image">Image</section>
</div>


    
</body>
</html>
