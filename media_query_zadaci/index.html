<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .container{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(7,1fr);
            gap: 10px;
                   
@media (max-width: 1600px) {
  .header {grid-area: 1 / span 1;}
  .menu {grid-area: 2 / span 3;}
  .hero {grid-area: 3/ span 4/span 2;}
  
}}
        
        .header{

        background-color: black;
        }
        .menu{
            background-color: red;
        }
        .hero{
            background-color: rgb(75, 92, 165);
        }
        .main{
            background-color: rgb(71, 71, 71);
        }
        .banner{
            background-color: rgb(252, 252, 136);
        }
        .extra{
            background-color: rgb(96, 167, 96);
        }
        .image{
            background-color: rgb(117, 152, 199);
        }
    </style>
</head>
<body>

<div class="container">
<div class="header">Header</div>
<div class="menu">Menu</div>
<div class="hero">Hero</div>
<div class="main">Main</div>
<div class="banner">Banner</div>
<div class="extra">Extra</div>
<div class="image">Image</div>
</div>


    
</body>
</html>
